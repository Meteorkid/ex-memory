<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#F2F2F7">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
    <title>ex-memory</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>💬</text></svg>">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icon-192.svg">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- 离线横幅 -->
<div id="offline-banner" class="offline-banner" role="alert">网络连接已断开，请检查网络设置</div>

<!-- ── 登录页 ── -->
<main id="page-auth" role="main">
    <div class="auth-card">
        <div class="auth-logo">
            <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                <path d="M26 16C18.268 16 12 21.373 12 28c0 3.866 2.064 7.308 5.312 9.68L16 42l5.2-2.8c1.8.6 3.8.94 5.8.94.68 0 1.36-.04 2.02-.12A9.5 9.5 0 0026 44c7.732 0 14-5.373 14-12S33.732 16 26 16z" fill="rgba(124,108,255,0.35)"/>
                <circle cx="21" cy="28" r="1.8" fill="#e8e4f0"/>
                <circle cx="26" cy="28" r="1.8" fill="#e8e4f0"/>
                <circle cx="31" cy="28" r="1.8" fill="#e8e4f0"/>
                <path d="M40 24c-6.627 0-12 4.477-12 10s5.373 10 12 10c1.68 0 3.28-.28 4.74-.8L52 46l-1.4-3.8C53.06 40.2 54 38.2 54 36c0-5.523-5.373-10-12-10h-2z" fill="rgba(124,108,255,0.6)"/>
                <circle cx="36.5" cy="34" r="1.5" fill="#e8e4f0"/>
                <circle cx="41" cy="34" r="1.5" fill="#e8e4f0"/>
                <circle cx="45.5" cy="34" r="1.5" fill="#e8e4f0"/>
            </svg>
        </div>
        <h1>ex-memory</h1>
        <p class="subtitle">把一段记忆，变成可以对话的人</p>
        <div class="tabs">
            <button id="tab-login-btn" class="tab active">登录</button>
            <button id="tab-register-btn" class="tab">注册</button>
        </div>

        <div id="form-login" class="form-box">
            <input type="text" id="login-username" placeholder="用户名" autocomplete="username">
            <div class="pwd-wrap">
                <input type="password" id="login-password" placeholder="密码" autocomplete="current-password">
                <button class="pwd-toggle" tabindex="-1" data-target="login-password" aria-label="显示密码">👁</button>
            </div>
            <button id="login-submit" class="btn">登录</button>
            <p id="login-error" class="err" role="alert"></p>
        </div>

        <div id="form-register" class="form-box" style="display:none">
            <input type="text" id="reg-username" placeholder="用户名（至少2个字符）" autocomplete="username">
            <div class="pwd-wrap">
                <input type="password" id="reg-password" placeholder="密码（至少6个字符）">
                <button class="pwd-toggle" tabindex="-1" data-target="reg-password" aria-label="显示密码">👁</button>
            </div>
            <div class="pwd-wrap">
                <input type="password" id="reg-password2" placeholder="再次输入密码">
                <button class="pwd-toggle" tabindex="-1" data-target="reg-password2" aria-label="显示密码">👁</button>
            </div>
            <button id="reg-submit" class="btn">注册</button>
            <p id="reg-error" class="err"></p>
        </div>
    </div>
</main>

<!-- ── 微信模拟器主界面 ── -->
<div id="page-main" style="display:none" role="application" aria-label="ex-memory 聊天应用">

    <!-- ═══ 桌面端标题栏（仅桌面端可见） ═══ -->
    <div class="desktop-titlebar">
        <div class="titlebar-traffic">
            <span class="traffic-light red"></span>
            <span class="traffic-light yellow"></span>
            <span class="traffic-light green"></span>
        </div>
        <span class="titlebar-app-name" id="titlebar-app-name">ex-memory</span>
        <div class="titlebar-spacer"></div>
    </div>

    <!-- ═══ 桌面端 + 移动端主体 ═══ -->
    <div class="app-body">

        <!-- ═══ 桌面端深色侧边栏（仅桌面端可见） ═══ -->
        <nav class="desktop-sidebar" role="navigation" aria-label="主导航">
            <div class="sidebar-top">
                <div class="sidebar-icon active" data-desktop-tab="chat" title="聊天" role="tab" aria-selected="true" tabindex="0">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                </div>
                <div class="sidebar-icon" data-desktop-tab="contacts" title="通讯录" role="tab" aria-selected="false" tabindex="-1">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </div>
                <div class="sidebar-icon" data-desktop-tab="discover" title="发现" role="tab" aria-selected="false" tabindex="-1">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8.56 2.75c4.37 6.03 6.02 9.42 8.03 17.72m2.54-15.38c-3.72 4.35-8.94 5.66-13.88 5.66"/></svg>
                </div>
            </div>
            <div class="sidebar-bottom">
                <div class="sidebar-icon" data-desktop-tab="me" title="我" role="tab" aria-selected="false" tabindex="-1">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </div>
            </div>
        </nav>

        <!-- ═══ 手机框架（移动端全屏 / 桌面端内容区） ═══ -->
        <div class="phone-frame">

            <!-- 状态栏（仅移动端可见） -->
            <div class="phone-statusbar">
                <span class="status-time" id="status-time">12:00</span>
                <span class="status-icons">📶 🔋 100%</span>
            </div>

            <!-- 标题栏 -->
            <div class="phone-navbar" id="phone-navbar">
                <button class="nav-back" id="nav-back-btn" style="display:none" aria-label="返回">
                    <svg width="12" height="20" viewBox="0 0 12 20" fill="none"><path d="M10 2L2 10l8 8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <span class="nav-title" id="nav-title">ex-memory</span>
                <button class="nav-action" id="nav-action-btn" style="display:none" aria-label="更多操作">•••</button>
            </div>

            <!-- 内容区 -->
            <div class="phone-content" id="phone-content">

                <!-- ═══ Tab 1: 聊天列表 ═══ -->
                <div id="tab-chat-list" class="tab-page">
                    <div class="chat-list-header">
                        <span>消息</span>
                    </div>
                    <div class="search-bar">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                        <input type="text" id="search-input" placeholder="搜索镜像">
                    </div>
                    <div id="contact-list" class="contact-list">
                        <p class="list-empty">暂无镜像，去「创建」一个吧</p>
                    </div>
                </div>

                <!-- ═══ 聊天详情 ═══ -->
                <div id="tab-chat-detail" class="tab-page" style="display:none">
                    <div class="chat-empty-hint" id="chat-empty-hint">
                        <div class="chat-empty-icon">💬</div>
                        <div class="chat-empty-text">选择一个镜像开始对话</div>
                    </div>
                    <div id="chat-msgs" class="chat-msgs" style="display:none" role="log" aria-live="polite" aria-label="聊天消息"></div>
                    <div id="chat-loading" class="chat-loading" style="display:none">
                        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                    </div>
                    <!-- 表情面板 -->
                    <div id="sticker-panel" class="sticker-panel" style="display:none">
                        <div class="sticker-tabs">
                            <button class="sticker-tab active" data-category="all">全部</button>
                            <button class="sticker-tab" data-category="emoji">😊 表情</button>
                            <button class="sticker-tab" data-category="image">🖼 图片</button>
                            <button class="sticker-tab" data-category="custom">⭐ 收藏</button>
                        </div>
                        <div id="sticker-grid" class="sticker-grid"></div>
                        <button id="sticker-upload-btn" class="sticker-upload-btn" title="添加自定义表情" aria-label="上传自定义贴纸">+</button>
                        <input type="file" id="sticker-file-input" accept="image/png,image/jpeg,image/gif,image/webp" style="display:none">
                    </div>
                    <!-- 输入栏 -->
                    <div class="chat-input-bar" role="group" aria-label="消息输入">
                        <button id="plus-btn" class="input-action" title="更多" aria-label="更多功能">＋</button>
                        <button id="voice-toggle-btn" class="input-action" title="语音" aria-label="语音输入">🎤</button>
                        <div id="voice-record-btn" class="voice-record-btn" style="display:none">
                            <span class="voice-recording-dot"></span>
                            按住 说话
                        </div>
                        <input type="text" id="msg-input" placeholder="" disabled aria-label="输入消息">
                        <button id="sticker-toggle-btn" class="input-action" aria-label="表情">😊</button>
                        <button id="msg-send" class="send-btn" disabled aria-label="发送消息">发送</button>
                    </div>
                    <!-- 图片上传（隐藏） -->
                    <input type="file" id="image-file-input" accept="image/*" style="display:none">
                    <!-- 更多功能面板 -->
                    <div id="plus-panel" class="plus-panel" style="display:none">
                        <div class="plus-panel-item" onclick="document.getElementById('image-file-input').click()">
                            <div class="plus-panel-icon">🖼</div>
                            <div class="plus-panel-label">图片</div>
                        </div>
                    </div>
                </div>

                <!-- ═══ Tab 2: 通讯录 ═══ -->
                <div id="tab-contacts" class="tab-page" style="display:none">
                    <div class="contacts-header">通讯录</div>
                    <div id="contact-profile" class="contact-profile">
                        <p class="list-empty">请先在聊天列表选择镜像</p>
                    </div>
                </div>

                <!-- ═══ Tab 3: 发现 ═══ -->
                <div id="tab-discover" class="tab-page" style="display:none">
                    <div class="discover-header">发现</div>
                    <div class="discover-list">
                        <div class="discover-item" id="moments-entry">
                            <span class="discover-icon">🎞</span>
                            <span class="discover-label">朋友圈</span>
                            <span class="discover-arrow">›</span>
                        </div>
                    </div>
                    <!-- 朋友圈时间线 -->
                    <div id="moments-timeline" class="moments-timeline" style="display:none">
                        <div id="moments-list"></div>
                    </div>
                </div>

                <!-- ═══ Tab 4: 我 ═══ -->
                <div id="tab-me" class="tab-page" style="display:none">
                    <div class="me-header">
                        <div class="me-avatar">🧑</div>
                        <div class="me-name" id="me-username">我</div>
                    </div>
                    <div class="me-menu">
                        <div class="me-item">
                            <span>🌓 外观</span>
                            <select id="theme-select" class="theme-select">
                                <option value="auto">跟随系统</option>
                                <option value="light">浅色</option>
                                <option value="dark">深色</option>
                            </select>
                        </div>
                        <div class="me-item" id="wallet-entry">
                            <span>💰 钱包</span>
                            <span class="discover-arrow">›</span>
                        </div>
                        <div class="me-item" id="create-entry">
                            <span>➕ 创建新镜像</span>
                            <span class="discover-arrow">›</span>
                        </div>
                        <div class="me-item" id="logout-entry">
                            <span>🚪 退出登录</span>
                            <span class="discover-arrow">›</span>
                        </div>
                    </div>
                </div>

                <!-- ═══ 钱包 ═══ -->
                <div id="tab-wallet" class="tab-page" style="display:none">
                    <div class="wallet-header">
                        <div class="wallet-balance-label">零钱</div>
                        <div class="wallet-balance" id="wallet-balance">¥ 0.00</div>
                    </div>
                    <div class="wallet-actions">
                        <button class="wallet-action-btn" id="wallet-redpacket-btn">🧧 红包记录</button>
                        <button class="wallet-action-btn" id="wallet-transfer-btn">💸 转账记录</button>
                    </div>
                    <div class="wallet-tx-list" id="wallet-tx-list">
                        <p class="list-empty">暂无交易记录</p>
                    </div>
                </div>

                <!-- ═══ 创建镜像 ═══ -->
                <div id="tab-create" class="tab-page" style="display:none">
                    <div class="create-container">
                        <h2>创建新镜像</h2>
                        <div class="create-form">
                            <label>代号 *</label>
                            <input type="text" id="create-name" placeholder="例如：前任名字" autocomplete="off">
                            <label>基本信息</label>
                            <textarea id="create-basic" rows="2" placeholder="你们的关系、认识时间、分手时间…"></textarea>
                            <label>ta 的性格特点</label>
                            <textarea id="create-personality" rows="2" placeholder="说话风格、口头禅、常用标点…"></textarea>
                            <label>导入聊天记录（可选）</label>
                            <div class="file-upload">
                                <input type="file" id="create-file" accept=".txt,.json,.jsonl,.csv">
                                <span class="file-name" id="create-file-name">未选择文件</span>
                            </div>
                            <p class="file-hint">支持微信导出 txt/json/jsonl/csv 格式</p>
                            <button id="create-submit" class="btn">创建镜像</button>
                            <p id="create-result" class="err"></p>
                        </div>
                    </div>
                </div>

            </div>

            <!-- 底部导航（仅移动端可见） -->
            <nav class="phone-tabbar" role="tablist" aria-label="底部导航">
                <button class="tabbar-btn active" data-tab="chat-list" role="tab" aria-selected="true">
                    <span class="tabbar-icon">💬</span>
                    <span class="tabbar-label">聊天</span>
                </button>
                <button class="tabbar-btn" data-tab="contacts" role="tab" aria-selected="false">
                    <span class="tabbar-icon">👤</span>
                    <span class="tabbar-label">通讯录</span>
                </button>
                <button class="tabbar-btn" data-tab="discover" role="tab" aria-selected="false">
                    <span class="tabbar-icon">🔍</span>
                    <span class="tabbar-label">发现</span>
                </button>
                <button class="tabbar-btn" data-tab="me" role="tab" aria-selected="false">
                    <span class="tabbar-icon">👤</span>
                    <span class="tabbar-label">我</span>
                </button>
            </nav>
        </div>
    </div>

    <!-- 红包开启动画覆盖层 -->
    <div id="redpacket-overlay" class="redpacket-overlay" style="display:none" role="dialog" aria-modal="true" aria-label="红包">
        <div class="redpacket-card" id="redpacket-card">
            <div class="redpacket-top">
                <div class="redpacket-icon">🧧</div>
                <div class="redpacket-sender" id="rp-sender">ta</div>
                <div class="redpacket-note" id="rp-note">给你的</div>
            </div>
            <div class="redpacket-bottom" id="redpacket-bottom">
                <button class="redpacket-open-btn" id="rp-open-btn">開</button>
            </div>
            <div class="redpacket-result" id="redpacket-result" style="display:none">
                <div class="redpacket-amount" id="rp-amount">¥ 0.00</div>
                <div class="redpacket-done-note" id="rp-done-note"></div>
                <button class="redpacket-close-btn" id="rp-close-btn">收下</button>
            </div>
            <div id="coins-container" class="coins-container"></div>
        </div>
    </div>
</div>

<!-- Action Sheet -->
<div id="action-sheet-overlay" class="action-sheet-overlay" style="display:none">
    <div class="action-sheet" id="action-sheet">
        <div class="action-sheet-options" id="action-sheet-options"></div>
        <button class="action-sheet-cancel" id="action-sheet-cancel">取消</button>
    </div>
</div>

<!-- 确认弹窗 -->
<div id="confirm-overlay" class="action-sheet-overlay" style="display:none">
    <div class="confirm-dialog" id="confirm-dialog">
        <div class="confirm-title" id="confirm-title"></div>
        <div class="confirm-message" id="confirm-message"></div>
        <div class="confirm-actions">
            <button class="confirm-btn cancel" id="confirm-cancel-btn">取消</button>
            <button class="confirm-btn danger" id="confirm-ok-btn">确认</button>
        </div>
    </div>
</div>

<script src="/static/app.js?v=20260529"></script>
</body>
</html>
